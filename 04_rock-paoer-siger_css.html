<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors v0.4</title>

  <style>
    body{
      background-color: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .title{
      font-size: 30px;
      font-weight: bold;
    }

    .action-btn{
      background: transparent;
      border: 2px solid white;
      border-radius: 50%;
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }

    .result{
      font-size: 22px;
      margin-top: 20px;
      font-weight: bold;
    }

    .reset-score-btn{
      margin-top: 20px;
      padding: 10px 15px;
      cursor: pointer;
      border: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<p class="title">Rock Paper Scissors Game</p>

<button class="action-btn" onclick="playGame('rock')">Rock</button>
<button class="action-btn" onclick="playGame('paper')">Paper</button>
<button class="action-btn" onclick="playGame('scissors')">Scissors</button>

<p class="js-result result"></p>
<p class="js-score"></p>

<button class="reset-score-btn" onclick="resetScore(); updateScoreDisplay();">
  Reset Score
</button>

<script>

let score = JSON.parse(localStorage.getItem("score"));

if (!score) {
  score = {
    wins: 0,
    losses: 0,
    ties: 0
  };
}

// INITIAL DISPLAY FIX
updateScoreDisplay();

function playGame(playerMove){

  const computerMove = pickComputerMove();
  let result = '';

  if(playerMove === computerMove){
    result = 'tie.';
  }
  else if(
    (playerMove === 'rock' && computerMove === 'scissors') ||
    (playerMove === 'paper' && computerMove === 'rock') ||
    (playerMove === 'scissors' && computerMove === 'paper')
  ){
    result = 'you win.';
  }
  else{
    result = 'you lose.';
  }

  if(result === 'you win.'){
    score.wins++;
  } else if(result === 'you lose.'){
    score.losses++;
  } else {
    score.ties++;
  }

  localStorage.setItem("score", JSON.stringify(score));

  document.querySelector('.js-result').innerHTML =
    `You picked ${playerMove}. Computer picked ${computerMove}. So you ${result}`;

  updateScoreDisplay();
}

function resetScore(){
  score = {
    wins: 0,
    losses: 0,
    ties: 0
  };

  localStorage.setItem("score", JSON.stringify(score));
  updateScoreDisplay();
}

function updateScoreDisplay(){
  document.querySelector('.js-score').innerHTML =
    `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
}

function pickComputerMove(){
  const randomNumber = Math.random();

  if(randomNumber < 1/3){
    return 'rock';
  } else if(randomNumber < 2/3){
    return 'paper';
  } else {
    return 'scissors';
  }
}

</script>

</body>
</html>
