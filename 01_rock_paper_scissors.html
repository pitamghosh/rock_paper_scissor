<!DOCTYPE html>
<html>
<head>
    <title>Rock Paper Scissors</title>
</head>
<body>

<h1>Rock Paper Scissors Game</h1>

<button onclick="
    const randomNumber = Math.random();

    let computerMove = '';

    if(randomNumber >= 0 && randomNumber < 1/3){
        computerMove = 'rock';
    } else if(randomNumber < 2/3){
        computerMove = 'paper';
    } else {
        computerMove = 'scissors';
    }

    let result = '';

    if(computerMove === 'rock'){
        result = 'tie';
    } else if(computerMove === 'paper'){
        result = 'you lose.';
    } else {
        result = 'you win.';
    }

    alert(`You Picked Rock. Computer Picked ${computerMove}. So You ${result}`);

">Rock</button>
